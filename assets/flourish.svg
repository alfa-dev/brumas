    d="M58,347
       C84,347 106,369 106,395
       C106,421 84,443 58,443
       C32,443 10,421 10,395
       C10,370 30,351 54,352
       C78,353 94,371 94,393
       C94,414 77,428 58,427
       C39,426 28,413 30,398
       C32,384 44,376 56,379
       C68,382 74,393 71,402
       C68,411 59,415 51,411"/>
  <!-- Small 4-petal flower inside bottom-left spiral -->
  <g fill="#a98340" transform="translate(20, 400)">
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(90)"/>
