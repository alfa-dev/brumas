  <!-- ====== LEAF PAIRS along the stems ====== -->
  <!-- Leaves are pairs of pointed ellipses branching off the stems -->
  <g fill="#a98340">

    <!-- Leaf pair at upper stem, y≈145 -->
    <ellipse cx="60" cy="138" rx="2.8" ry="7.5" transform="rotate(-38 60 138)"/>
    <ellipse cx="76" cy="133" rx="2.8" ry="7.5" transform="rotate(32 76 133)"/>

    <!-- Leaf pair at mid stem, y≈230 -->
    <ellipse cx="67" cy="228" rx="2.5" ry="6.5" transform="rotate(-28 67 228)"/>
    <ellipse cx="80" cy="222" rx="2.5" ry="6.5" transform="rotate(22 80 222)"/>
    <ellipse cx="110" cy="225" rx="2.5" ry="6.5" transform="rotate(-22 110 225)"/>
    <ellipse cx="122" cy="230" rx="2.5" ry="6.5" transform="rotate(28 122 230)"/>

    <!-- Leaf pair at lower stem, y≈315 -->
    <ellipse cx="68" cy="314" rx="2.5" ry="6" transform="rotate(-20 68 314)"/>
    <ellipse cx="81" cy="308" rx="2.5" ry="6" transform="rotate(18 81 308)"/>
    <ellipse cx="112" cy="310" rx="2.3" ry="5.5" transform="rotate(-18 112 310)"/>
    <ellipse cx="124" cy="316" rx="2.3" ry="5.5" transform="rotate(22 124 316)"/>

    <!-- Small accent dots on stems -->
    <circle cx="74" cy="195" r="2"/>
    <circle cx="106" cy="268" r="1.8"/>
  </g>

  <!-- ====== SMALL 5-PETAL FLOWER at stem tip (top of composition) ====== -->
  <g fill="#a98340" transform="translate(92, 10)">
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="3.5"/>
  </g>

  <!-- ====== TOP-RIGHT LARGE SPIRAL: center=(148,60), r=38 ====== -->
  <path stroke="#a98340" stroke-width="1.8" stroke-linecap="round"
    d="M148,22
       C169,22 186,39 186,60
       C186,81 169,98 148,98
       C127,98 111,82 113,62
       C115,43 130,32 146,34
       C162,36 170,49 167,61
