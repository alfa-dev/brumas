    <path stroke-width="1.2" d="M95,510 C98,450 105,383 112,313 C118,247 116,188 124,128 C130,83 136,46 132,8"/>
    <path stroke-width="0.9" d="M95,510 C88,448 76,382 68,310 C60,242 63,182 55,122 C49,78 42,40 46,5"/>
    <path stroke-width="0.9" d="M95,510 C100,447 110,380 118,308 C126,240 124,180 132,120 C138,76 145,38 141,3"/>
    <path stroke-width="0.7" d="M95,510 C82,445 65,375 54,300 C44,228 47,165 36,100"/>
