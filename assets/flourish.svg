       C190,464 180,474 168,474
       C156,474 147,465 149,453
       C151,442 160,436 168,438
       C176,440 181,449 178,456
       C175,463 167,466 161,462"/>
  <ellipse fill="#a98340" cx="153" cy="438" rx="2.2" ry="5.1" transform="rotate(-24 153 438)"/>

</svg>
