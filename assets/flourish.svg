    <ellipse cx="0" cy="-5.5" rx="2.5" ry="4.8" transform="rotate(90)"/>
    <circle  cx="0" cy="0"   r="2.5"/>
  </g>

  <!-- ====== MID-LEFT COUNTER SPIRAL: center=(42,278), r=30 ====== -->
  <path stroke="#a98340" stroke-width="1.5" stroke-linecap="round"
    d="M72,278
       C72,261 58,248 42,248
       C26,248 14,262 14,278
       C14,294 27,308 42,307
       C57,306 67,293 65,280
       C63,267 53,261 42,263
       C31,265 26,275 29,283
       C32,291 41,295 49,291"/>
  <ellipse fill="#a98340" cx="52" cy="258" rx="2.2" ry="5.6" transform="rotate(-38 52 258)"/>

  <!-- ====== BOTTOM-LEFT LARGE SPIRAL: center=(58,395), r=48 ====== -->
  <path stroke="#a98340" stroke-width="2.5" stroke-linecap="round"
    d="M58,347
       C84,347 106,369 106,395
       C106,421 84,443 58,443
       C32,443 10,421 10,395
       C10,370 30,351 54,352
       C78,353 94,371 94,393
       C94,414 77,428 58,427
       C39,426 28,413 30,398
       C32,384 44,376 56,379
       C68,382 74,393 71,402
       C68,411 59,415 51,411"/>
  <g fill="#a98340" transform="translate(20, 400)">
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(90)"/>
    <circle  cx="0" cy="0"  r="2.8"/>
  </g>
  <ellipse fill="#a98340" cx="76" cy="356" rx="2.5" ry="6.4" transform="rotate(-22 76 356)"/>

  <!-- ====== BOTTOM-RIGHT MEDIUM SPIRAL: center=(148,395), r=40 ====== -->
  <path stroke="#a98340" stroke-width="2.2" stroke-linecap="round"
    d="M148,355
       C170,355 188,373 188,395
       C188,417 170,435 148,435
       C126,435 109,418 111,397
       C113,377 128,366 145,368
       C162,370 171,383 168,396
       C165,409 153,416 142,411"/>
  <ellipse fill="#a98340" cx="116" cy="397" rx="3" ry="5.5" transform="rotate(-8 116 397)"/>

  <!-- ====== SMALL BOTTOM SPIRAL: center=(168,452), r=22 ====== -->
  <path stroke="#a98340" stroke-width="1.8" stroke-linecap="round"
    d="M168,430
