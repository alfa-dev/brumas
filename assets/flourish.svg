  <!-- ====== MID-RIGHT SPIRAL: center=(148,210), r=32 ====== -->
  <path stroke="#a98340" stroke-width="2" stroke-linecap="round"
    d="M148,178
       C165,178 180,192 180,210
       C180,228 165,243 148,243
       C131,243 118,229 120,212
       C122,196 135,188 148,190
       C161,192 168,203 165,213
       C162,223 152,228 143,224"/>
  <g fill="#a98340" transform="translate(131, 212)">
