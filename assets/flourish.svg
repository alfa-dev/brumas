<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 520" fill="none">
  <defs>
    <!-- Brush taper: opaque/thick at bottom (y=520), fades to near-invisible at top (y=0) -->
    <linearGradient id="brushFade" x1="0" y1="520" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a98340" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#a98340" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a98340" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Lighter version for thin stems -->
    <linearGradient id="brushFadeThin" x1="0" y1="520" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a98340" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#a98340" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a98340" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ====== FAN STEMS — pronounced S-curves, gradient brush taper ====== -->
  <!-- Thick/main stems -->
  <g fill="none" stroke-linecap="round">
    <!-- Far left sweep -->
    <path stroke="url(#brushFade)" stroke-width="3.2"
      d="M93,515 C62,445 38,368 36,285 C34,202 52,148 22,82 C14,60 14,28 18,4"/>
    <!-- Mid-left, S-curve -->
    <path stroke="url(#brushFade)" stroke-width="2.5"
      d="M94,515 C70,448 52,375 50,298 C48,222 62,162 46,98 C36,60 38,26 42,6"/>
    <!-- Slight-left with reverse S -->
    <path stroke="url(#brushFade)" stroke-width="2"
      d="M95,515 C80,450 68,380 66,308 C64,238 76,178 60,114 C50,74 52,36 54,8"/>
    <!-- Center-left -->
    <path stroke="url(#brushFade)" stroke-width="1.8"
      d="M95,515 C88,452 80,384 78,314 C76,246 84,186 70,122 C62,84 62,42 64,10"/>
    <!-- Center-right (mirror) -->
    <path stroke="url(#brushFade)" stroke-width="1.8"
      d="M97,515 C104,452 112,384 114,314 C116,246 108,186 122,122 C130,84 130,42 128,10"/>
    <!-- Slight-right -->
    <path stroke="url(#brushFade)" stroke-width="2"
      d="M97,515 C112,450 126,378 128,305 C130,232 118,172 134,108 C144,68 142,30 140,8"/>
    <!-- Mid-right S-curve -->
    <path stroke="url(#brushFade)" stroke-width="2.5"
      d="M98,515 C122,446 142,372 144,292 C146,215 132,155 150,90 C160,54 158,22 154,5"/>
    <!-- Far right sweep -->
    <path stroke="url(#brushFade)" stroke-width="3.2"
      d="M99,515 C130,442 156,362 158,278 C160,196 144,140 166,74 C174,50 178,22 174,4"/>
  </g>

  <!-- Thinner outer fans -->
  <g fill="none" stroke-linecap="round">
    <path stroke="url(#brushFadeThin)" stroke-width="1.2"
      d="M92,515 C55,445 28,365 24,278 C20,192 42,132 8,64"/>
    <path stroke="url(#brushFadeThin)" stroke-width="1.2"
      d="M100,515 C138,443 168,362 172,274 C176,188 154,128 188,60"/>
    <path stroke="url(#brushFadeThin)" stroke-width="0.7"
      d="M91,515 C46,442 16,358 10,266 C4,176 30,110 -4,44"/>
  </g>

  <!-- Curving tendril branches sweeping left — pronounced arcs with curl -->
  <g fill="none" stroke-linecap="round">
    <path stroke="url(#brushFadeThin)" stroke-width="0.8"
      d="M66,328 C46,312 20,308 6,322 C-4,332 0,346 10,344"/>
    <path stroke="url(#brushFadeThin)" stroke-width="0.65"
      d="M62,346 C44,334 22,336 8,350 C-2,360 2,374 10,372"/>
    <path stroke="url(#brushFadeThin)" stroke-width="0.5"
      d="M60,364 C46,358 30,354 18,366 C8,376 12,388 18,385"/>
  </g>

  <!-- ====== SCATTERED LEAVES (organic, non-paired) ====== -->
  <g fill="#a98340">
    <ellipse cx="56"  cy="148" rx="2.6" ry="7.2" transform="rotate(-43 56 148)"/>
    <ellipse cx="78"  cy="163" rx="2"   ry="5.2" transform="rotate(56 78 163)"/>
    <ellipse cx="124" cy="143" rx="3"   ry="7.8" transform="rotate(34 124 143)"/>
    <ellipse cx="110" cy="165" rx="1.8" ry="4.5" transform="rotate(-28 110 165)"/>
    <ellipse cx="68"  cy="210" rx="2.4" ry="6.2" transform="rotate(-31 68 210)"/>
    <ellipse cx="118" cy="196" rx="2.2" ry="5.6" transform="rotate(49 118 196)"/>
    <ellipse cx="132" cy="224" rx="2.8" ry="6.8" transform="rotate(27 132 224)"/>
    <ellipse cx="84"  cy="180" rx="2.1" ry="5"   transform="rotate(-19 84 180)"/>
    <ellipse cx="56"  cy="260" rx="2.5" ry="6.2" transform="rotate(-23 56 260)"/>
    <ellipse cx="112" cy="272" rx="2"   ry="5.1" transform="rotate(39 112 272)"/>
    <ellipse cx="72"  cy="297" rx="2.6" ry="6.6" transform="rotate(-46 72 297)"/>
    <ellipse cx="126" cy="287" rx="2.2" ry="5.4" transform="rotate(17 126 287)"/>
    <ellipse cx="106" cy="246" rx="2.4" ry="5.8" transform="rotate(43 106 246)"/>
  </g>

  <!-- ====== SMALL 5-PETAL FLOWER at stem tip ====== -->
  <g fill="#a98340" transform="translate(92, 10)">
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="3"   ry="6.5" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="3.5"/>
  </g>

  <!-- ====== TOP-RIGHT LARGE SPIRAL: center=(148,60), r=38 ====== -->
  <path stroke="#a98340" stroke-width="1.8" stroke-linecap="round"
    d="M148,22
       C169,22 186,39 186,60
       C186,81 169,98 148,98
       C127,98 111,82 113,62
       C115,43 130,32 146,34
       C162,36 170,49 167,61
       C164,73 153,79 143,75"/>
  <g fill="#a98340" transform="translate(152, 62)">
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(90)"/>
    <circle  cx="0" cy="0"  r="2.8"/>
  </g>

  <!-- ====== TOP-LEFT SMALL SPIRAL: center=(108,44), r=24 ====== -->
  <path stroke="#a98340" stroke-width="1.5" stroke-linecap="round"
    d="M108,20
       C122,20 132,31 132,44
       C132,57 121,68 108,68
       C95,68 85,57 87,45
       C89,33 100,27 110,29
