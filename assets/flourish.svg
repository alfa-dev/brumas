<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 520" fill="none">
  <defs>
    <!--
      Brush taper: all stems originate near y=470 (convergence point).
      Opaque at base, fades to near-invisible at the tips.
    -->
    <linearGradient id="brush" x1="0" y1="470" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a98340" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#a98340" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#a98340" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="brushThin" x1="0" y1="470" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a98340" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a98340" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!--
    ====================================================================
    STEMS — all converge near (95, 470).
    Main ones curve toward the spirals; fine ones fan out and fade.
    ====================================================================
  -->

  <!-- Main stems going upward to top spirals -->
  <g fill="none" stroke="url(#brush)" stroke-linecap="round">
    <!-- toward top-right large spiral -->
    <path stroke-width="1.8"
      d="M95,470 C96,395 112,318 128,242 C138,185 144,135 148,28"/>
    <!-- toward top inner small spiral -->
    <path stroke-width="1.5"
      d="M95,470 C94,394 100,316 106,240 C110,182 112,132 112,26"/>
    <!-- center-left upward stem -->
    <path stroke-width="1.3"
      d="M95,470 C92,392 86,315 82,240 C78,180 74,132 70,76"/>
    <!-- toward mid-right spiral -->
    <path stroke-width="1.4"
      d="M95,470 C102,420 118,372 132,320 C142,282 147,252 148,185"/>
    <!-- toward mid-left counter-spiral (arcs left) -->
    <path stroke-width="1.2"
      d="M95,470 C84,448 74,422 68,398 C62,374 62,348 72,278"/>
  </g>

  <!-- Fine/hair stems — fan wide, fade to nothing -->
  <g fill="none" stroke="url(#brushThin)" stroke-linecap="round">
    <path stroke-width="0.9"
      d="M95,470 C72,438 46,396 28,338 C14,292 6,248 4,182"/>
    <path stroke-width="0.7"
      d="M95,470 C66,436 34,390 16,330 C2,280 -4,230 -6,162"/>
    <path stroke-width="0.7"
      d="M95,470 C106,438 126,396 144,340 C158,296 164,252 166,186"/>
    <path stroke-width="0.5"
      d="M95,470 C58,432 24,385 6,322 C-6,272 -10,222 -12,155"/>
    <path stroke-width="0.5"
      d="M95,470 C110,434 134,386 155,326 C170,278 176,228 178,162"/>
  </g>

  <!-- Short stems connecting convergence to the lower spirals -->
  <g fill="none" stroke="url(#brush)" stroke-linecap="round">
    <!-- to bottom-left large spiral — sweeps left then curls into entry -->
    <path stroke-width="1.7"
      d="M95,470 C76,468 60,462 52,452 C45,444 44,425 52,350"/>
    <!-- to bottom-right medium spiral -->
    <path stroke-width="1.7"
      d="M95,470 C112,468 130,464 140,456 C147,450 148,440 148,357"/>
    <!-- to small bottom spiral -->
    <path stroke-width="1.2"
      d="M95,470 C120,472 142,472 155,469 C162,467 165,462 165,435"/>
  </g>

  <!-- Curling tendril branches off the left hair stems -->
  <g fill="none" stroke="#a98340" stroke-linecap="round">
    <path stroke-width="0.65"
      d="M32,335 C16,322 0,322 -8,334 C-14,344 -10,356 -2,354"/>
    <path stroke-width="0.55"
      d="M22,354 C8,344 -6,347 -12,360 C-16,370 -12,381 -4,378"/>
    <path stroke-width="0.45"
      d="M12,374 C2,367 -10,372 -14,382 C-18,392 -14,402 -8,399"/>
  </g>

  <!--
    ====================================================================
    TEARDROP ACCENTS — filled solid shapes, scattered organically
    ====================================================================
  -->
  <g fill="#a98340">
    <!-- Upper stem area, prominent drops -->
    <ellipse cx="124" cy="234" rx="4"   ry="9"   transform="rotate(20 124 234)"/>
    <ellipse cx="109" cy="222" rx="3.5" ry="7.5" transform="rotate(9 109 222)"/>
    <ellipse cx="88"  cy="228" rx="3"   ry="6.5" transform="rotate(-6 88 228)"/>
    <!-- Mid section -->
    <ellipse cx="74"  cy="268" rx="2.6" ry="5.8" transform="rotate(-18 74 268)"/>
    <ellipse cx="134" cy="258" rx="2.5" ry="5.5" transform="rotate(22 134 258)"/>
    <!-- Fine stem drops -->
    <ellipse cx="30"  cy="328" rx="1.8" ry="4.2" transform="rotate(-30 30 328)"/>
    <ellipse cx="158" cy="332" rx="1.8" ry="4"   transform="rotate(32 158 332)"/>
    <!-- Near lower spiral entries -->
    <ellipse cx="54"  cy="445" rx="3"   ry="6.5" transform="rotate(-8 54 445)"/>
    <ellipse cx="140" cy="448" rx="3"   ry="6"   transform="rotate(12 140 448)"/>
  </g>

  <!--
    ====================================================================
    SPIRALS
    ====================================================================
  -->

  <!-- Top-right large spiral: center=(148,67), r=40 -->
  <path stroke="#a98340" stroke-width="1.8" stroke-linecap="round"
    d="M148,27
       C170,27 188,45 188,67
       C188,89 170,107 148,107
       C126,107 109,90 111,69
       C113,49 128,38 146,40
       C163,42 171,56 168,68
       C165,80 154,85 144,81"/>
  <!-- Accent teardrops inside top-right spiral -->
  <ellipse fill="#a98340" cx="150" cy="68" rx="3.5" ry="6.5" transform="rotate(10 150 68)"/>
  <ellipse fill="#a98340" cx="134" cy="54" rx="2.5" ry="4.5" transform="rotate(-15 134 54)"/>

  <!-- Top inner small spiral: center=(112,50), r=22 -->
  <path stroke="#a98340" stroke-width="1.5" stroke-linecap="round"
    d="M112,28
       C124,28 134,38 134,50
       C134,62 124,72 112,72
       C100,72 91,63 93,51
       C95,40 105,34 115,37
       C124,40 129,50 125,59
       C121,67 111,70 103,66"/>

  <!-- Mid-right spiral: center=(148,215), r=30 -->
  <path stroke="#a98340" stroke-width="1.8" stroke-linecap="round"
    d="M148,185
       C164,185 178,199 178,215
       C178,231 164,245 148,245
       C132,245 119,232 121,216
       C123,200 135,192 148,194
       C160,196 167,207 164,217
       C161,227 151,232 142,228"/>
  <ellipse fill="#a98340" cx="126" cy="216" rx="2.8" ry="5.5" transform="rotate(5 126 216)"/>

  <!-- Mid-left counter-clockwise spiral: center=(40,272), r=28 -->
  <path stroke="#a98340" stroke-width="1.4" stroke-linecap="round"
    d="M68,272
       C68,256 55,244 40,244
       C25,244 13,257 13,272
       C13,287 26,300 40,299
       C55,298 65,286 63,274
       C61,262 51,256 40,258
       C30,260 25,270 28,278
       C31,286 40,290 48,287"/>
  <ellipse fill="#a98340" cx="19" cy="272" rx="2.5" ry="5" transform="rotate(-5 19 272)"/>

  <!-- Bottom-left large spiral: center=(52,395), r=45 -->
  <path stroke="#a98340" stroke-width="2.3" stroke-linecap="round"
    d="M52,350
       C78,350 97,370 97,395
       C97,420 78,440 52,440
       C26,440 7,420 7,395
       C7,371 25,353 50,354
       C75,355 91,374 91,395
       C91,416 74,430 52,429
       C31,428 18,413 20,397
       C22,383 35,376 47,379
       C59,382 65,393 62,402
       C59,412 49,416 41,411"/>
  <!-- 4-petal flower inside bottom-left spiral -->
  <g fill="#a98340" transform="translate(16,397)">
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6" rx="2.8" ry="5.5" transform="rotate(90)"/>
    <circle  cx="0" cy="0"  r="2.8"/>
  </g>

  <!-- Bottom-right medium spiral: center=(148,395), r=38 -->
  <path stroke="#a98340" stroke-width="2.1" stroke-linecap="round"
    d="M148,357
       C170,357 186,374 186,395
       C186,416 170,433 148,433
       C126,433 110,417 112,397
       C114,377 128,367 145,369
       C162,371 170,384 167,396
       C164,408 153,415 143,410"/>
  <ellipse fill="#a98340" cx="116" cy="396" rx="3" ry="5.5" transform="rotate(-8 116 396)"/>

  <!-- Small bottom spiral: center=(165,452), r=20 -->
  <path stroke="#a98340" stroke-width="1.6" stroke-linecap="round"
    d="M165,432
       C177,432 185,441 185,452
       C185,463 177,472 165,472
       C153,472 145,463 147,452
       C149,442 158,437 166,439
       C174,441 178,450 175,457
       C172,464 163,466 157,462"/>
  <ellipse fill="#a98340" cx="148" cy="452" rx="2.5" ry="4.5" transform="rotate(-12 148 452)"/>

</svg>
